version: "3.9"

services:
  # ──────────────────────────────────────────
  # 后端：FastAPI + uvicorn
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: court-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    expose:
      - "8000"
    networks:
      - court-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────
  # 前端构建器：Vite build，产物交给 nginx
  # ──────────────────────────────────────────
  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile.build
    container_name: court-frontend-builder
    volumes:
      - frontend-dist:/app/dist

  # ──────────────────────────────────────────
  # Nginx：反向代理 + 静态文件服务
  # ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: court-nginx
    restart: unless-stopped
    ports:
      - "9000:80"
    volumes:
      - ./nginx/court.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-builder:
        condition: service_completed_successfully
    networks:
      - court-net

networks:
  court-net:
    driver: bridge

volumes:
  frontend-dist:
